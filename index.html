<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오늘의 기억 — 데일리 두뇌 챌린지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --canvas:#0F1B22;
    --panel:#16262F;
    --panel-2:#1C2F39;
    --tile:#223A45;
    --tile-edge:#2C4A57;
    --amber:#F2B544;
    --amber-dim:#9c7a3a;
    --mint:#5BD6A6;
    --coral:#E8654F;
    --text:#EAF2F4;
    --muted:#8AA3AD;
    --muted-2:#5E757E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--canvas);
    color:var(--text);
    font-family:'Pretendard',-apple-system,system-ui,sans-serif;
    display:flex;justify-content:center;align-items:flex-start;
    min-height:100%;
    overflow-x:hidden;
  }
  .num{font-family:'Space Grotesk','Pretendard',sans-serif;font-variant-numeric:tabular-nums;}
  .app{
    width:100%;max-width:420px;min-height:100vh;
    padding:22px 20px 36px;
    display:flex;flex-direction:column;
    position:relative;
  }

  /* ---- shared ---- */
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber-dim);font-weight:600;}
  .screen{display:none;flex:1;flex-direction:column;}
  .screen.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  button{font-family:inherit;cursor:pointer;border:none;}

  /* ---- start ---- */
  .start-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .date-tag{font-size:13px;color:var(--muted);}
  .streak{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--tile-edge);
    padding:7px 11px;border-radius:99px;font-size:13px;font-weight:600;}
  .streak b{color:var(--amber);}
  .hero{margin-top:20px;}
  .hero h1{font-size:36px;line-height:1.05;font-weight:800;letter-spacing:-.02em;}
  .hero p{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.55;max-width:300px;}
  .hero .accent{color:var(--amber);}
  .preview-grid{
    margin:18px auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:148px;
  }
  .preview-grid div{aspect-ratio:1;border-radius:11px;background:var(--tile);border:1px solid var(--tile-edge);}
  .preview-grid div.on{background:var(--amber);box-shadow:0 0 22px -4px var(--amber);border-color:var(--amber);}
  .spacer{height:14px;}
  .cta{
    width:100%;background:var(--amber);color:#10202a;font-size:17px;font-weight:700;
    padding:17px;border-radius:15px;letter-spacing:-.01em;transition:transform .12s;
  }
  .cta:active{transform:scale(.98);}
  .cta.ghost{background:transparent;color:var(--text);border:1px solid var(--tile-edge);}
  .cta.ad{background:var(--panel-2);color:var(--text);border:1px solid var(--amber-dim);}
  .cta.ad .tag{display:inline-block;font-size:11px;color:var(--amber);border:1px solid var(--amber-dim);
    border-radius:5px;padding:1px 6px;margin-left:8px;vertical-align:middle;font-weight:600;}
  .hint{text-align:center;color:var(--muted-2);font-size:12.5px;margin-top:14px;line-height:1.5;}

  /* ---- play ---- */
  .play-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .round-dots{display:flex;gap:6px;}
  .round-dots i{width:24px;height:4px;border-radius:2px;background:var(--tile);display:block;}
  .round-dots i.done{background:var(--mint);}
  .round-dots i.cur{background:var(--amber);}
  .score-now{font-size:14px;color:var(--muted);}
  .score-now b{color:var(--text);font-weight:700;}
  .status{text-align:center;margin:22px 0 18px;min-height:54px;}
  .status .big{font-size:22px;font-weight:700;letter-spacing:-.01em;}
  .status .sub{font-size:13.5px;color:var(--muted);margin-top:5px;}
  .status .sub b{color:var(--amber);}
  .board{
    display:grid;gap:10px;margin:0 auto;width:100%;max-width:330px;
    aspect-ratio:1;
  }
  .cell{
    border-radius:13px;background:var(--tile);border:1px solid var(--tile-edge);
    transition:transform .1s, background .15s, box-shadow .2s, border-color .15s;
  }
  .cell.lit{background:var(--amber);box-shadow:0 0 24px -2px var(--amber);border-color:var(--amber);}
  .cell.sel{background:var(--panel-2);border-color:var(--amber);box-shadow:inset 0 0 0 2px var(--amber);}
  .cell.ok{background:var(--mint);border-color:var(--mint);box-shadow:0 0 20px -4px var(--mint);}
  .cell.miss{border-color:var(--amber);box-shadow:inset 0 0 0 2px var(--amber);background:transparent;}
  .cell.bad{background:var(--coral);border-color:var(--coral);}
  .cell.tappable{cursor:pointer;}
  .cell.tappable:active{transform:scale(.93);}
  .play-foot{margin-top:auto;padding-top:22px;padding-bottom:26px;}
  .foot-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;min-height:22px;}
  .foot-left{display:flex;gap:8px;}
  .restart-btn{background:transparent;border:1px solid var(--tile-edge);color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;transition:transform .12s;}
  .restart-btn:active{transform:scale(.95);}
  .sel-count{text-align:right;font-size:14px;color:var(--muted);margin-bottom:0;}
  .mode-seg{display:flex;background:var(--panel);border:1px solid var(--tile-edge);border-radius:11px;padding:4px;gap:4px;margin-top:2px;}
  .seg-btn{flex:1;background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:14px;font-weight:700;padding:9px;border-radius:8px;cursor:pointer;transition:all .15s;}
  .seg-btn.active{background:var(--amber);color:#10202a;}
  .sel-count b{color:var(--text);}
  .timer{height:4px;background:var(--tile);border-radius:2px;overflow:hidden;margin-bottom:18px;}
  .timer i{display:block;height:100%;background:var(--amber);width:100%;transition:width .1s linear;}

  /* ---- result ---- */
  .result-hero{text-align:center;margin-top:18px;}
  .result-hero .label{font-size:13px;color:var(--muted);letter-spacing:.04em;}
  .pct{font-size:72px;font-weight:700;line-height:1;margin-top:6px;letter-spacing:-.03em;}
  .pct .small{font-size:30px;color:var(--muted);font-weight:500;}
  .result-hero .verdict{margin-top:10px;font-size:15px;color:var(--amber);font-weight:600;}
  .stat-row{display:flex;gap:11px;margin-top:24px;}
  .stat{flex:1;background:var(--panel);border:1px solid var(--tile-edge);border-radius:14px;padding:15px 13px;}
  .stat .k{font-size:12px;color:var(--muted);}
  .stat .v{font-size:26px;font-weight:700;margin-top:5px;}
  .stat .v small{font-size:14px;color:var(--muted);font-weight:500;}
  .lb{margin-top:24px;background:var(--panel);border:1px solid var(--tile-edge);border-radius:16px;overflow:hidden;}
  .lb-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 12px;}
  .lb-head .t{font-size:14px;font-weight:700;}
  .lb-head .league{font-size:12px;color:var(--amber);font-weight:600;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid #11212a;font-size:14px;}
  .lb-row .rk{width:30px;color:var(--muted);font-weight:600;}
  .lb-row .nm{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-row .sc{color:var(--muted);font-weight:600;}
  .lb-row.me{background:linear-gradient(90deg,rgba(242,181,68,.14),rgba(242,181,68,.04));}
  .lb-row.me .rk{color:var(--amber);}
  .lb-row.me .nm{color:var(--amber);font-weight:700;}
  .lb-row.me .sc{color:var(--amber);}
  .lb-gap{text-align:center;color:var(--muted-2);font-size:13px;padding:7px;border-top:1px solid #11212a;}
  .nudge{margin-top:18px;background:var(--panel-2);border:1px solid var(--amber-dim);border-radius:13px;
    padding:14px 15px;font-size:13.5px;line-height:1.55;color:var(--text);}
  .nudge b{color:var(--amber);}
  .result-actions{margin-top:18px;display:flex;flex-direction:column;gap:10px;}

  /* ---- identity + shared board ---- */
  .ident{margin-top:16px;background:var(--panel);border:1px solid var(--tile-edge);border-radius:14px;padding:14px;}
  .my-best{margin-top:10px;display:flex;justify-content:space-between;align-items:center;
    background:var(--panel-2);border:1px solid var(--amber-dim);border-radius:12px;padding:13px 16px;font-size:14px;}
  .my-best .k{color:var(--muted);font-weight:600;}
  .my-best .v{color:var(--amber);font-weight:800;}
  .ident label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;letter-spacing:.02em;}
  .ident input{width:100%;background:var(--canvas);border:1px solid var(--tile-edge);border-radius:10px;
    color:var(--text);font-family:inherit;font-size:15px;padding:11px 12px;outline:none;}
  .ident input:focus{border-color:var(--amber);}
  .conn-row{display:flex;gap:8px;margin-top:10px;}
  .conn-btn{flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--amber-dim);
    border-radius:10px;font-size:13px;font-weight:600;padding:11px;}
  .conn-btn.sub{background:transparent;color:var(--muted);border-color:var(--tile-edge);flex:0 0 auto;padding:11px 13px;}
  .conn-state{font-size:12px;margin-top:9px;line-height:1.5;color:var(--muted-2);}
  .conn-state.ok{color:var(--mint);}
  .conn-state.warn{color:var(--amber);}
  .lb-head .src{font-size:11px;color:var(--muted-2);}

  /* ---- start-screen live Top 5 ---- */
  .start-rank{margin-top:18px;background:var(--panel);border:1px solid var(--tile-edge);border-radius:14px;overflow:hidden;}
  .sr-head{padding:12px 15px 10px;font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
  .sr-head .sr-sub{font-size:11px;color:var(--amber);font-weight:700;letter-spacing:.06em;}
  .sr-row{display:flex;align-items:center;gap:12px;padding:9px 15px;border-top:1px solid #11212a;font-size:13.5px;}
  .sr-row .sr-rk{width:20px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;}
  .sr-row .sr-nm{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sr-row .sr-sc{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;}
  .sr-row:first-of-type .sr-rk{color:var(--amber);}
  .sr-empty{padding:14px 15px;color:var(--muted-2);font-size:13px;text-align:center;}
  #verTag{position:fixed;right:8px;top:6px;font-size:10px;color:var(--amber);opacity:.85;pointer-events:none;z-index:100001;letter-spacing:.02em;background:rgba(15,27,34,.7);padding:2px 6px;border-radius:6px;}
</style>
</head>
<body>
<div class="app">
<div id="verTag">v8 · 홈버튼</div>

  <!-- ============ START ============ -->
  <section class="screen active" id="screen-start">
    <style>
      .game-switch{display:flex;gap:6px;margin-bottom:16px;}
      .game-switch a{flex:1;text-align:center;text-decoration:none;padding:10px 5px;border-radius:11px;
        font-weight:800;font-size:12.5px;border:1px solid var(--tile-edge);color:var(--muted);white-space:nowrap;
        background:var(--panel);transition:transform .12s,background .15s,color .15s,border-color .15s;}
      .game-switch a.on{color:#10202a;background:linear-gradient(180deg,#ffcf6b,var(--amber));border-color:transparent;}
      .game-switch a:active{transform:scale(.98);}
    </style>
    <nav class="game-switch">
      <a href="index.html" class="on">🧠 오늘의 기억</a>
      <a href="game.html">📜 사자성어</a>
      <a href="safety.html">🦺 안전 찍GO!</a>
    </nav>
    <div class="mode-seg" id="modeSeg">
      <button class="seg-btn active" data-mode="normal">일반</button>
      <button class="seg-btn" data-mode="hard">하드 🔥</button>
    </div>

    <div class="hero">
      <h1 id="heroTitle">매번 새로운<br><span class="accent">5개</span>의 패턴.</h1>
      <p id="heroDesc">시작할 때마다 완전히 새로운 패턴이 생성됩니다.
         얼마나 기억하고, 얼마나 빠른가. 계속 도전하세요.</p>
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <div class="ident">
      <label>닉네임 (순위표에 표시됩니다)</label>
      <input id="nameInput" type="text" maxlength="12" placeholder="예: 영업3팀 김민수" autocomplete="off">
      <div class="conn-state" id="connState">서버에 연결되면 자동으로 순위표에 기록됩니다</div>
    </div>

    <div class="spacer"></div>
    <button class="cta" id="btnStart">시작하기</button>
    <p class="hint" id="hint">약 2분 · 할 때마다 새 패턴 · 점수로 순위 경쟁</p>

    <div class="start-rank" id="startRank" style="display:none">
      <div class="sr-head" id="srHead">🏆 명예의 전당 <span class="sr-sub">TOP 5</span></div>
      <div id="srRows"></div>
    </div>
    <div class="my-best" id="myBest" style="display:none">
      <span class="k">🙋 내 최고 기록</span>
      <span class="v num" id="myBestVal">-</span>
    </div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="screen-play">
    <div class="play-head">
      <div class="round-dots" id="roundDots"></div>
      <div class="score-now">점수 <b class="num" id="scoreNow">0</b></div>
    </div>

    <div class="status">
      <div class="big" id="statusBig">라운드 1</div>
      <div class="sub" id="statusSub">잘 보세요</div>
    </div>

    <div class="board" id="board"></div>

    <div class="play-foot">
      <div class="timer" id="timerWrap" style="visibility:hidden"><i id="timerBar"></i></div>
      <div class="foot-row">
        <div class="foot-left">
          <button class="restart-btn" id="btnRestart">↺ 처음부터</button>
          <button class="restart-btn" id="btnHomePlay">🏠 홈으로</button>
        </div>
        <div class="sel-count" id="selCount" style="visibility:hidden">선택 <b><span id="selN">0</span>/<span id="selT">0</span></b></div>
      </div>
      <button class="cta" id="btnConfirm" style="visibility:hidden">확인</button>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section class="screen" id="screen-result">
    <div class="eyebrow">오늘의 결과</div>
    <div class="result-hero">
      <div class="label" id="pctLabel">전 세계 기준</div>
      <div class="pct num">상위 <span id="pctNum">0</span><span class="small">%</span></div>
      <div class="verdict" id="verdict">—</div>
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="k">최종 점수</div>
        <div class="v num" id="finalScore">0</div>
      </div>
      <div class="stat">
        <div class="k">기억력 나이</div>
        <div class="v num" id="brainAge">0<small>세</small></div>
      </div>
    </div>

    <div class="lb">
      <div class="lb-head">
        <div>
          <div class="t" id="lbTitle">오늘의 순위</div>
          <div class="src" id="lbSrc"></div>
        </div>
        <div class="league" id="leagueTag">🥈 실버 리그</div>
      </div>
      <div id="lbRows"></div>
    </div>

    <div class="nudge" id="nudge">—</div>

    <div class="result-actions">
      <button class="cta" id="btnHome">🏠 처음으로</button>
      <button class="cta ad" id="btnRetry">광고 보고 마지막 라운드 재도전 <span class="tag">+점수</span></button>
      <button class="cta ad" id="btnAnalysis">광고 보고 기억력 정밀 분석 <span class="tag">상세</span></button>
      <button class="cta ghost" id="btnShare">결과 공유하기</button>
    </div>
  </section>

</div>

<script>
/* ===================== 날짜 시드 ===================== */
function todaySeedStr(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function hashSeed(str){
  let h = 1779033703 ^ str.length;
  for (let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return (h ^ (h>>>16)) >>> 0;
}
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function pickN(rng, total, n){
  const idx = [...Array(total).keys()];
  for (let i=idx.length-1;i>0;i--){ const j = Math.floor(rng()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return idx.slice(0,n).sort((a,b)=>a-b);
}

const SEED_STR = todaySeedStr();
const rng = mulberry32(hashSeed('memory-'+SEED_STR));

/* ===================== 모드 / 라운드 설정 ===================== */
const MODES = {
  normal: {
    label:'일반', scoreMul:1,
    desc:'시작할 때마다 완전히 새로운 패턴이 생성됩니다. 얼마나 기억하고, 얼마나 빠른가. 계속 도전하세요.',
    rounds:[
      {size:3, tiles:3, view:1500, answer:5000},
      {size:3, tiles:4, view:1400, answer:5000},
      {size:4, tiles:5, view:1300, answer:6000},
      {size:4, tiles:6, view:1100, answer:6000},
      {size:5, tiles:6, view:1000, answer:6500},
    ]
  },
  hard: {
    label:'하드', scoreMul:5,
    desc:'7×7 격자에 11칸이 한 번에 번쩍. 단 한 판으로 끝나는 고난도 승부입니다. 집중하세요.',
    rounds:[
      {size:7, tiles:11, view:2600, answer:9000},
    ]
  }
};
let MODE='normal';
let ROUNDS = MODES[MODE].rounds;

function pickNRandom(total, n){
  const idx=[...Array(total).keys()];
  for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  return idx.slice(0,n).sort((a,b)=>a-b);
}
function rollPatterns(){ ROUNDS.forEach(r=>{ r.target = pickNRandom(r.size*r.size, r.tiles); }); }
function setMode(m){ MODE=m; ROUNDS=MODES[m].rounds; rollPatterns(); }
setMode('normal'); // 초기 1회

/* ===================== 상태 ===================== */
let curRound = 0, totalScore = 0, selected = new Set(), answering = false;
let roundStart = 0, timerId = null, lastRoundScore = 0;

/* ===================== DOM ===================== */
const $ = id => document.getElementById(id);
function show(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('screen-'+name).classList.add('active');
}

/* ===================== 시작 화면 ===================== */
(function initStart(){
  // 미리보기 그리드: 실제 게임 패턴과 무관한 장식용 랜덤 (힌트 방지)
  const pg = $('previewGrid'); pg.innerHTML='';
  const deco = pickNRandom(9, 3);
  for(let i=0;i<9;i++){
    const c=document.createElement('div');
    if(deco.includes(i)) c.classList.add('on');
    pg.appendChild(c);
  }
})();

$('btnStart').onclick = ()=>{ rollPatterns(); curRound=0; totalScore=0; show('play'); startRound(); };

/* 모드 토글 (일반 / 하드) */
function applyModeUI(){
  $('heroTitle').innerHTML = MODE==='hard'
    ? '7×7,<br><span class="accent">단 한 번</span>의 승부.'
    : '매번 새로운<br><span class="accent">5개</span>의 패턴.';
  $('heroDesc').textContent = MODES[MODE].desc;
  $('hint').textContent = MODE==='hard'

/* ===================== 라운드 진행 ===================== */
function renderDots(){
  const dd=$('roundDots'); dd.innerHTML='';
  for(let i=0;i<ROUNDS.length;i++){
    const i2=document.createElement('i');
    if(i<curRound) i2.classList.add('done');
    else if(i===curRound) i2.classList.add('cur');
    dd.appendChild(i2);
  }
}
function buildBoard(size){
  const b=$('board'); b.innerHTML='';
  b.style.gridTemplateColumns=`repeat(${size},1fr)`;
  b.style.gap = size>=6 ? '6px' : '10px';
  b.style.maxWidth = size>=7 ? '360px' : size>=5 ? '340px' : (size>=4?'320px':'280px');
  const radius = size>=6 ? '8px' : '13px';
  for(let i=0;i<size*size;i++){
    const c=document.createElement('div');
    c.className='cell'; c.dataset.i=i; c.style.borderRadius=radius;
    b.appendChild(c);
  }
}
function startRound(){
  const R=ROUNDS[curRound];
  selected.clear(); answering=false;
  renderDots();
  $('scoreNow').textContent=totalScore;
  $('statusBig').textContent=`라운드 ${curRound+1}`;
  $('statusSub').innerHTML=`<b>${R.tiles}칸</b>을 잘 보세요`;
  $('timerWrap').style.visibility='hidden';
  $('selCount').style.visibility='hidden';
  $('btnConfirm').style.visibility='hidden';
  buildBoard(R.size);

  // 패턴 점등
  setTimeout(()=>{
    R.target.forEach(i=>{ const c=cell(i); if(c) c.classList.add('lit'); });
    // 점등 종료 → 입력 단계
    setTimeout(()=>{
      R.target.forEach(i=>{ const c=cell(i); if(c) c.classList.remove('lit'); });
      enterAnswer(R);
    }, R.view);
  }, 450);
}
function cell(i){ return document.querySelector(`.cell[data-i="${i}"]`); }

function enterAnswer(R){
  answering=true;
  $('statusBig').textContent='기억나는 칸을 누르세요';
  $('statusSub').innerHTML='빠를수록 <b>속도 보너스</b>';
  $('selT').textContent=R.tiles; $('selN').textContent=0;
  $('selCount').style.visibility='visible';
  $('btnConfirm').style.visibility='visible';
  $('timerWrap').style.visibility='visible';
  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.add('tappable');
    c.onclick=()=>toggleCell(c,R);
  });
  // 타이머
  roundStart=performance.now();
  const dur=R.answer;
  $('timerBar').style.transition='none'; $('timerBar').style.width='100%';
  requestAnimationFrame(()=>{
    $('timerBar').style.transition=`width ${dur}ms linear`;
    $('timerBar').style.width='0%';
  });
  clearTimeout(timerId);
  timerId=setTimeout(()=>{ if(answering) submitRound(R); }, dur);
}
function toggleCell(c,R){
  if(!answering) return;
  const i=+c.dataset.i;
  if(selected.has(i)){ selected.delete(i); c.classList.remove('sel'); }
  else{
    if(selected.size>=R.tiles) return;
    selected.add(i); c.classList.add('sel');
  }
  $('selN').textContent=selected.size;
  if(selected.size===R.tiles) submitRound(R); // 다 고르면 자동 제출
}
$('btnConfirm').onclick=()=>{ if(answering) submitRound(ROUNDS[curRound]); };

function submitRound(R){
  if(!answering) return;
  answering=false;
  clearTimeout(timerId);
  $('timerBar').style.transition='none';
  const elapsed=performance.now()-roundStart;
  document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('tappable');c.onclick=null;});

  // 채점
  let correct=0, wrong=0;
  R.target.forEach(i=>{
    const c=cell(i);
    if(selected.has(i)){ c.classList.add('ok'); correct++; }
    else c.classList.add('miss');
  });
  selected.forEach(i=>{ if(!R.target.includes(i)){ cell(i).classList.add('bad'); wrong++; } });

  const base=Math.round(correct/R.tiles*1000);
  const penalty=wrong*140;
  const speedBonus=correct===R.tiles ? Math.max(0,Math.round((1-elapsed/R.answer)*350)) : 0;
  lastRoundScore=Math.round(Math.max(0, base - penalty + speedBonus) * (MODES[MODE].scoreMul||1));
  totalScore+=lastRoundScore;
  $('scoreNow').textContent=totalScore;

  // 피드백 (자존심 장치: 정답률 노출)
  const passRate=70+Math.round(rng()*22); // 70~92%, 시드 기반
  if(correct===R.tiles && wrong===0){
    $('statusBig').textContent='완벽해요';
    $('statusSub').innerHTML=`+${lastRoundScore}점 ${speedBonus>0?'· <b>속도 보너스</b>':''}`;
  }else{
    $('statusBig').textContent=`${correct}/${R.tiles} 기억`;
    $('statusSub').innerHTML=`이 패턴, <b>${passRate}%</b>가 통과했어요`;
  }
  $('selCount').style.visibility='hidden';
  $('btnConfirm').style.visibility='hidden';
  $('timerWrap').style.visibility='hidden';

  setTimeout(()=>{
    curRound++;
    if(curRound>=ROUNDS.length) showResult();
    else startRound();
  }, 1500);
}

/* ===================== 리더보드 (시드 기반 가짜 분포) ===================== */
const NICK_A=['고요한','빠른','강철','은빛','새벽','전설의','조용한','번개','심야','노련한','집중한','무심한'];
const NICK_B=['여우','두뇌','기억','늑대','부엉이','사슴','매','거북','반달곰','수달','까치','고래'];
function fakeLeaderboard(myScore){
  const r=mulberry32(hashSeed('lb-'+SEED_STR+'-'+myScore));
  const N=4200; // 오늘 참가자 수
  function gauss(){ let u=0,v=0; while(u===0)u=r(); while(v===0)v=r();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  // 내 백분위/등수 추정 (평균 ~3100, 표준편차 ~900 분포 기준)
  let higher=0;
  for(let k=0;k<800;k++){ const s=3100+gauss()*900; if(s>myScore) higher++; }
  const pctTop=Math.max(1, Math.min(99, Math.round(higher/800*100)));
  const myRank=Math.max(1, Math.round(higher/800*N));

  function nick(seed){ const rr=mulberry32(seed); return NICK_A[Math.floor(rr()*NICK_A.length)]+' '+NICK_B[Math.floor(rr()*NICK_B.length)]; }
  // 내 점수를 기준점으로 등수마다 일관된 점수 생성 (위는 높게, 아래는 낮게 · 항상 단조 감소)
  const step=Math.max(20, Math.round(myScore*0.013));
  function scoreAt(rank){
    if(rank===myRank) return myScore;
    const base=myScore + (myRank-rank)*step;
    const jitter=Math.round((mulberry32(hashSeed('s'+SEED_STR+rank))()-0.5)*step*0.5);
    return Math.max(0, base+jitter);
  }
  const row=(rank)=>({rank, name: rank===myRank?'나':nick(hashSeed('n'+SEED_STR+rank)),
                      score: scoreAt(rank), me: rank===myRank});

  const rows=[];
  if(myRank<=4){
    // 상위권: 1위부터 나까지 연속 표시
    for(let rk=1; rk<=Math.max(3,myRank); rk++) rows.push(row(rk));
  }else{
    for(let rk=1; rk<=3; rk++) rows.push(row(rk));
    rows.push({gap:true});
    for(let rk=myRank-1; rk<=myRank+1; rk++){ if(rk>3) rows.push(row(rk)); }
  }
  return {rows, pctTop, myRank, N};
}

/* ===================== 공유 순위표 엔진 ===================== */
function esc(s){ return String(s).replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

const Persist = {
  name:'', handle:null, handleName:'', records:[], connected:false,

  loadName(){ try{ return localStorage.getItem('memgame_name')||''; }catch(e){ return ''; } },
  saveName(v){ try{ localStorage.setItem('memgame_name', v); }catch(e){} },
  currentName(){ const v=($('nameInput').value||'').trim(); return v || '익명'; },

  setState(text, cls){ const el=$('connState'); el.className='conn-state'+(cls?(' '+cls):''); el.textContent=text; },

  async verifyPerm(h){
    const o={mode:'readwrite'};
    if(await h.queryPermission(o)==='granted') return true;
    if(await h.requestPermission(o)==='granted') return true;
    return false;
  },
  async read(){
    try{ const f=await this.handle.getFile(); const t=await f.text();
      const d=JSON.parse(t||'[]'); this.records=Array.isArray(d)?d:[]; }
    catch(e){ this.records=[]; }
  },
  async write(){
    const w=await this.handle.createWritable();
    await w.write(JSON.stringify(this.records,null,2)); await w.close();
  },
  upsert(name, score, age, mode){
    mode=mode||'normal';
    let r=this.records.find(x=>x.id===name && (x.mode||'normal')===mode);
    if(!r){ r={id:name,mode,best:score,bestAge:age,plays:1,last:Date.now()}; this.records.push(r); }
    else { if(score>r.best){ r.best=score; r.bestAge=age; } r.plays=(r.plays||0)+1; r.last=Date.now(); }
    return r;
  },

  async connect(){
    if(!window.showOpenFilePicker){ this.setState('이 브라우저는 공유 파일 연결을 지원하지 않아요. 크롬·엣지를 사용하거나 [새 파일]로 내보내세요.','warn'); return; }
    try{
      const [h]=await window.showOpenFilePicker({multiple:false,
        types:[{description:'순위표 파일',accept:{'application/json':['.json']}}]});
      if(!await this.verifyPerm(h)){ this.setState('파일 쓰기 권한이 거부됐어요.','warn'); return; }
      this.handle=h; this.handleName=h.name; this.connected=true;
      await this.read();
      this.setState(`✓ 연결됨: ${esc(h.name)} · 현재 ${this.records.length}명 기록`,'ok');
    }catch(e){ /* 사용자가 취소 */ }
  },
  async createNew(){
    if(window.showSaveFilePicker){
      try{
        const h=await window.showSaveFilePicker({suggestedName:'dept_scores.json',
          types:[{description:'순위표 파일',accept:{'application/json':['.json']}}]});
        if(!await this.verifyPerm(h)){ this.setState('파일 쓰기 권한이 거부됐어요.','warn'); return; }
        this.handle=h; this.handleName=h.name; this.connected=true;
        if(this.records.length===0) this.records=[];
        await this.write();
        this.setState(`✓ 새 파일 생성: ${esc(h.name)} · 같은 파일을 부서원이 [연결]하면 공유됩니다`,'ok');
      }catch(e){ /* 취소 */ }
    }else{
      // 비크로미움 폴백: 파일 다운로드 → 공유 폴더에 직접 두기
      const blob=new Blob([JSON.stringify(this.records,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='dept_scores.json'; a.click(); URL.revokeObjectURL(a.href);
      this.setState('파일을 내려받았어요. 공유 폴더에 옮겨두고 사용하세요. (자동 연결은 크롬·엣지 전용)','warn');
    }
  },

  recordLocal(score, age){
    try{
      const arr=JSON.parse(localStorage.getItem('memgame_local')||'[]');
      arr.push({name:this.currentName(),score,age,t:Date.now()});
      localStorage.setItem('memgame_local', JSON.stringify(arr.slice(-200)));
    }catch(e){}
  },

  async recordAndRenderDept(score, age){
    this.name=this.currentName();
    await this.read();                 // 다른 사람 최신 기록 반영
    this.upsert(this.name, score, age, MODE);
    try{ await this.write(); }catch(e){ this.setState('저장 실패 — 파일 접근이 끊겼어요. 다시 연결해 주세요.','warn'); }

    const mine=this.records.filter(r=>(r.mode||'normal')===MODE);
    renderDeptBoard(mine, this.name, `${esc(this.handleName||'공유 파일')} · ${MODES[MODE].label}`);
  }
};

/* ===================== 부서 순위표 렌더 (파일/서버 공용) ===================== */
function renderDeptBoard(records, myName, srcLabel){
  const sorted=[...records].sort((a,b)=>(b.best||0)-(a.best||0));
  const total=sorted.length||1;
  const myRank=Math.max(1, sorted.findIndex(x=>x.id===myName)+1);
  const me=sorted[myRank-1] || {id:myName,best:0};
  const pct=Math.max(1, Math.round(myRank/total*100));

  $('pctLabel').textContent='부서 내 기준';
  $('pctNum').textContent=pct;
  $('lbTitle').textContent='부서 순위표';
  $('lbSrc').textContent=`${srcLabel} · ${total}명 참가`;

  const league = pct<=10?'💎 다이아 리그':pct<=33?'🥇 골드 리그':pct<=66?'🥈 실버 리그':'🥉 브론즈 리그';
  $('leagueTag').textContent=league;

  let verdict;
  if(myRank===1) verdict='🏆 부서 1위! 자리 지킬 수 있겠어요?';
  else if(pct<=33) verdict='🔥 상위권. 1위까지 노려볼 만해요.';
  else if(pct<=66) verdict='중위권. 한 판만 더 잘 풀면 올라갑니다.';
  else verdict='아직 아래쪽. 최고 기록만 남으니 계속 갱신해보세요.';
  $('verdict').textContent=verdict;

  const wrap=$('lbRows'); wrap.innerHTML='';
  const addRow=(rank,name,sc,isMe)=>{
    const row=document.createElement('div'); row.className='lb-row'+(isMe?' me':'');
    row.innerHTML=`<div class="rk num">${rank}</div><div class="nm">${esc(name)}</div><div class="sc num">${(sc||0).toLocaleString()}</div>`;
    wrap.appendChild(row);
  };
  sorted.slice(0,8).forEach((r,i)=> addRow(i+1, r.id, r.best, r.id===myName));
  if(myRank>8){ const g=document.createElement('div'); g.className='lb-gap'; g.textContent='· · ·'; wrap.appendChild(g);
    addRow(myRank, me.id, me.best, true); }

  const above = myRank>1 ? sorted[myRank-2] : null;
  $('nudge').innerHTML = above
    ? `바로 위 <b>${esc(above.id)}</b>까지 <b>${((above.best||0)-(me.best||0)).toLocaleString()}점</b>. 한 판 더 가볼까요?`
    : `현재 부서 <b>1위</b>입니다. 누가 도전할지 모르니 기록을 더 벌려두세요.`;
}

/* ===================== 결과 화면 ===================== */
function renderGlobalBoard(){
  const lb=fakeLeaderboard(totalScore);
  $('pctLabel').textContent='전 세계 기준';
  $('pctNum').textContent=lb.pctTop;
  $('lbTitle').textContent='오늘의 순위'; $('lbSrc').textContent='';

  let verdict;
  if(lb.pctTop<=5) verdict='💎 최상위권. 기록 깨질 일 거의 없겠는데요.';
  else if(lb.pctTop<=20) verdict='🔥 잘했어요. 상위 한 자릿수까진 한 끗 차이.';
  else if(lb.pctTop<=50) verdict='평균 이상. 한 라운드만 더 살렸으면 순위권이었어요.';
  else verdict='아깝다. 다음 판엔 충분히 만회할 수 있어요.';
  $('verdict').textContent=verdict;

  const league = lb.pctTop<=5?'💎 다이아 리그':lb.pctTop<=20?'🥇 골드 리그':lb.pctTop<=50?'🥈 실버 리그':'🥉 브론즈 리그';
  $('leagueTag').textContent=league;

  // 내 점수가 항상 순위표에 보이도록 구성 (상위 3 + 내 위치)
  const wrap=$('lbRows'); wrap.innerHTML='';
  const r2=mulberry32(hashSeed('g'+SEED_STR+totalScore));
  const nm=()=>NICK_A[Math.floor(r2()*NICK_A.length)]+' '+NICK_B[Math.floor(r2()*NICK_B.length)];
  const addRow=(rank,name,sc,me)=>{
    const row=document.createElement('div'); row.className='lb-row'+(me?' me':'');
    row.innerHTML=`<div class="rk num">${rank}</div><div class="nm">${me?'나 (내 점수)':esc(name)}</div><div class="sc num">${sc.toLocaleString()}</div>`;
    wrap.appendChild(row);
  };
  const MAX=6800, myRank=Math.max(1, lb.myRank);
  if(myRank<=3){                      // 내가 상위 3위 안 → 그 자리에 내 점수 표시
    for(let rk=1;rk<=3;rk++){
      let sc;
      if(rk===myRank) sc=totalScore;
      else if(rk<myRank) sc=Math.min(MAX, totalScore + (myRank-rk)*Math.round(70+r2()*90));
      else sc=Math.max(0, totalScore - (rk-myRank)*Math.round(70+r2()*90));
      addRow(rk, nm(), sc, rk===myRank);
    }
  }else{                              // 상위 3 + … + 내 순위/점수
    let prev=MAX;
    for(let rk=1;rk<=3;rk++){ const s=Math.max(totalScore+60, prev-Math.round(40+r2()*100)); addRow(rk, nm(), s, false); prev=s; }
    const g=document.createElement('div'); g.className='lb-gap'; g.textContent='· · ·'; wrap.appendChild(g);
    addRow(myRank, null, totalScore, true);
  }

  const aheadGap=Math.round(120+r2()*180);
  $('nudge').innerHTML = (myRank<=1)
    ? `🏆 현재 <b>1위</b>! 이 점수, 누가 넘을 수 있을까요?`
    : (lb.pctTop<=50
        ? `바로 위 순위까지 <b>${aheadGap}점</b>. 마지막 라운드만 다시 풀면 추월할 수 있어요.`
        : `<b>리그 승급</b>까지 한 칸. 한 판이면 충분합니다.`);
}

async function showResult(){
  const age=Math.max(18, Math.min(75, Math.round(74 - totalScore/95)));
  $('finalScore').textContent=totalScore.toLocaleString();
  $('brainAge').innerHTML=`${age}<small>세</small>`;
  show('result');

  if(Net.available){
    $('lbRows').innerHTML='<div class="lb-gap">순위표 갱신 중…</div>';
    try{
      const name=Persist.currentName();
      const records=await Net.submit(name, totalScore, age, MODE);
      let mine=records.filter(r=>(r.mode||'normal')===MODE);
      // 안전장치: 서버 응답에 내 기록이 없어도 내 점수 줄은 항상 표시
      if(!mine.some(r=>r.id===name)) mine=[...mine, {id:name, mode:MODE, best:totalScore, bestAge:age}];
      renderDeptBoard(mine, name, `부서 서버 · ${MODES[MODE].label}`);
    }catch(e){
      renderGlobalBoard(); // 서버 일시 오류 시 폴백
    }
  }else if(Persist.connected){
    $('lbRows').innerHTML='<div class="lb-gap">기록 저장 중…</div>';
    await Persist.recordAndRenderDept(totalScore, age);
  }else{
    renderGlobalBoard();
    Persist.recordLocal(totalScore, age); // 연결 전이라도 이 PC에 기록은 남김
  }
}

/* ===================== 광고/공유 더미 ===================== */
$('btnRetry').onclick=()=>{
  // 데모: 마지막 라운드만 재도전 (광고 자리)
  alert('[광고 자리]\n\n실제 앱에서는 보상형 전면 광고가 재생된 뒤,\n마지막(가장 어려운) 라운드만 다시 풀어 점수를 만회합니다.');
  curRound=ROUNDS.length-1; totalScore-=lastRoundScore; show('play'); startRound();
};
$('btnAnalysis').onclick=()=>alert('[광고 자리]\n\n광고 시청 후: 라운드별 정답/오답, 평균 반응속도,\n같은 연령대 대비 위치 등 "정밀 분석" 화면을 보여줍니다.');
$('btnHome').onclick=()=>{ clearTimeout(timerId); answering=false; show('start'); loadStartRank(); };
$('btnShare').onclick=()=>{
  const pct=$('pctNum').textContent;
  alert(`[공유 미리보기]\n\n🧠 오늘의 기억 — ${SEED_STR.slice(4,6)}/${SEED_STR.slice(6,8)}\n상위 ${pct}% · ${totalScore.toLocaleString()}점\n당신도 오늘 패턴 풀어볼래요?`);
};

/* ===================== 닉네임 + 공유 순위표 연결 ===================== */
$('nameInput').value = Persist.loadName();
$('nameInput').addEventListener('input', e=>Persist.saveName(e.target.value));

/* 부서 서버로 열렸으면 자동 연결 */
(async function initServerMode(){
  if(await Net.detect()){
    Persist.setState('✓ 부서 서버에 연결됨 · 기록이 자동으로 저장·공유됩니다','ok');
  }
  loadStartRank();   // 명예의 전당 + 내 최고 기록 (서버/오프라인 모두)
})();
</script>
