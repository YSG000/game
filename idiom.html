<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>사자성어 도전</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --canvas:#0F1B22; --panel:#16262F; --panel-2:#1C2F39; --tile:#223A45;
    --tile-edge:#2C4A57; --amber:#F2B544; --amber-dim:#9c7a3a; --mint:#5BD6A6;
    --coral:#E8654F; --text:#EAF2F4; --muted:#8AA3AD; --muted-2:#5E757E;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Pretendard',-apple-system,system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #1a2e38 0%, var(--canvas) 60%);
    color:var(--text); min-height:100vh; display:flex; align-items:center;
    justify-content:center; padding:20px;
  }
  .wrap{width:100%; max-width:440px;}
  .home{position:fixed; top:16px; left:16px; color:var(--muted); text-decoration:none; font-size:14px;}
  .home:hover{color:var(--text);}
  .kicker{color:var(--amber); font-weight:700; letter-spacing:.14em; font-size:12px; text-align:center;}
  h1{font-size:28px; font-weight:800; text-align:center; margin-top:8px; letter-spacing:-.02em;}
  .sub{color:var(--muted); text-align:center; margin-top:10px; font-size:14px; line-height:1.6;}
  .panel{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--tile-edge); border-radius:20px; padding:24px; margin-top:22px;
  }
  input{
    width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--tile-edge);
    background:var(--tile); color:var(--text); font-size:16px; font-family:inherit; text-align:center;
  }
  input:focus{outline:none; border-color:var(--amber-dim);}
  .btn{
    width:100%; padding:16px; border:none; border-radius:14px; font-size:17px; font-weight:800;
    font-family:inherit; cursor:pointer; margin-top:14px; color:#10202a;
    background:linear-gradient(180deg,#ffcf6b,var(--amber));
  }
  .btn:active{transform:scale(.99);}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--tile-edge); font-weight:700;}
  .hide{display:none !important;}

  /* 플레이 화면 */
  .topbar{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); margin-bottom:14px;}
  .topbar b{color:var(--text); font-weight:800;}
  .timerwrap{height:8px; background:var(--tile); border-radius:999px; overflow:hidden; margin-bottom:22px;}
  .timerbar{height:100%; width:100%; background:linear-gradient(90deg,var(--mint),var(--amber)); border-radius:999px;}
  .qlabel{color:var(--amber); font-size:12px; font-weight:700; letter-spacing:.1em; text-align:center;}
  .qmean{font-size:20px; font-weight:700; line-height:1.55; text-align:center; margin:14px 4px 24px; min-height:66px; display:flex; align-items:center; justify-content:center;}
  .choices{display:flex; flex-direction:column; gap:12px;}
  .choice{
    width:100%; padding:16px; border-radius:14px; border:1px solid var(--tile-edge);
    background:var(--tile); color:var(--text); font-size:19px; font-weight:800; font-family:inherit;
    cursor:pointer; letter-spacing:.04em; transition:transform .08s, background .15s, border-color .15s;
  }
  .choice:active{transform:scale(.99);}
  .choice.correct{background:rgba(91,214,166,.18); border-color:var(--mint); color:var(--mint);}
  .choice.wrong{background:rgba(232,101,79,.16); border-color:var(--coral); color:var(--coral);}
  .choice:disabled{cursor:default;}

  /* 결과 */
  .bigscore{font-size:52px; font-weight:800; text-align:center; color:var(--amber); font-family:'Pretendard';}
  .scorelabel{text-align:center; color:var(--muted); font-size:13px; margin-top:2px;}
  .stats{display:flex; justify-content:center; gap:22px; margin:18px 0 6px; color:var(--muted); font-size:13px;}
  .stats b{display:block; color:var(--text); font-size:20px; font-weight:800; text-align:center;}
  .board{margin-top:20px;}
  .board h3{font-size:14px; color:var(--muted); margin-bottom:10px; text-align:center;}
  .row{display:flex; align-items:center; padding:10px 12px; border-radius:10px; font-size:14px;}
  .row+.row{margin-top:4px;}
  .row.me{background:rgba(242,181,68,.12); border:1px solid var(--amber-dim);}
  .rank{width:30px; color:var(--muted); font-weight:800;}
  .rname{flex:1; font-weight:700;}
  .rscore{color:var(--amber); font-weight:800;}
  .me .rname{color:var(--amber);}
  .netnote{text-align:center; font-size:12px; color:var(--muted-2); margin-top:16px; line-height:1.5;}
</style>
</head>
<body>
  <div class="wrap">

    <!-- 시작 -->
    <section id="startScreen">
      <style>
        .game-switch{display:flex;gap:8px;margin-bottom:18px;}
        .game-switch a{flex:1;text-align:center;text-decoration:none;padding:11px 8px;border-radius:12px;
          font-weight:800;font-size:14px;border:1px solid var(--tile-edge);color:var(--muted);
          background:var(--panel);transition:transform .12s,background .15s,color .15s,border-color .15s;}
        .game-switch a.on{color:#10202a;background:linear-gradient(180deg,#ffcf6b,var(--amber));border-color:transparent;}
        .game-switch a:active{transform:scale(.98);}
      </style>
      <nav class="game-switch">
        <a href="index.html">🧠 오늘의 기억</a>
        <a href="idiom.html" class="on">📜 사자성어 스피드퀴즈</a>
      </nav>
      <div class="kicker">IDIOM CHALLENGE</div>
      <h1>사자성어 도전</h1>
      <div class="sub">뜻을 보고 알맞은 사자성어를 고르세요.<br>10문제 · 문제당 5초 승부.</div>
      <div class="panel">
        <input id="nick" maxlength="12" placeholder="닉네임을 입력하세요" autocomplete="off">
        <button class="btn" id="startBtn">시작하기</button>
      </div>
    </section>

    <!-- 플레이 -->
    <section id="playScreen" class="hide">
      <div class="topbar">
        <span>문제 <b id="qnum">1</b>/10</span>
        <span>점수 <b id="curScore">0</b></span>
      </div>
      <div class="timerwrap"><div class="timerbar" id="timerbar"></div></div>
      <div class="qlabel">이 뜻을 가진 사자성어는?</div>
      <div class="qmean" id="qmean">—</div>
      <div class="choices" id="choices"></div>
    </section>

    <!-- 결과 -->
    <section id="resultScreen" class="hide">
      <div class="kicker">결과</div>
      <div class="panel">
        <div class="bigscore" id="finalScore">0</div>
        <div class="scorelabel">최종 점수</div>
        <div class="stats">
          <div><b id="correctCnt">0</b>정답</div>
          <div><b id="accuracy">0%</b>정확도</div>
          <div><b id="gradeTxt">-</b>등급</div>
        </div>
        <div class="board" id="boardBox">
          <h3>부서 순위 (사자성어)</h3>
          <div id="boardList"></div>
        </div>
        <div class="netnote" id="netnote"></div>
        <button class="btn" id="retryBtn">한 번 더</button>
        <button class="btn ghost" id="homeBtn">🏠 홈으로</button>
      </div>
    </section>

  </div>

<script>
/* ===== 사자성어 데이터 (자주 쓰는 것) ===== */
const IDIOMS = [

  {i:"죽마고우", m:"어릴 때부터 함께 놀며 자란 오랜 친구"},
  {i:"다다익선", m:"많으면 많을수록 더욱 좋음"},
  {i:"온고지신", m:"옛것을 익히어 새로운 것을 앎"},
  {i:"청출어람", m:"제자나 후배가 스승이나 선배보다 더 뛰어남"},
  {i:"과유불급", m:"정도를 지나침은 미치지 못함과 같음"},
  {i:"역지사지", m:"처지를 서로 바꾸어 생각함"},
  {i:"고진감래", m:"고생 끝에 즐거움이 옴"},
  {i:"감언이설", m:"남의 비위를 맞추는 달콤한 말"},
  {i:"동병상련", m:"같은 처지의 사람끼리 서로 가엾게 여김"},
  {i:"견물생심", m:"물건을 보면 갖고 싶은 욕심이 생김"},
  {i:"일취월장", m:"나날이 다달이 자라거나 발전함"},
  {i:"자업자득", m:"자기가 저지른 일의 결과를 자기가 받음"},
  {i:"인과응보", m:"행한 대로 그에 맞는 결과를 받음"},
  {i:"오리무중", m:"안개 속에 있어 방향을 알 수 없음 · 갈피를 못 잡음"},
  {i:"이심전심", m:"마음에서 마음으로 뜻이 서로 통함"},
  {i:"어부지리", m:"둘이 다투는 사이 엉뚱한 제삼자가 이익을 봄"},
  {i:"금상첨화", m:"좋은 일 위에 또 좋은 일이 더해짐"},
  {i:"설상가상", m:"난처한 일이나 불행이 잇따라 겹침"},
  {i:"유유상종", m:"비슷한 무리끼리 서로 사귐"},
  {i:"사면초가", m:"사방이 적으로 둘러싸여 고립된 처지"},
  {i:"전화위복", m:"화가 도리어 복이 됨"},
  {i:"각골난망", m:"입은 은혜를 뼈에 새겨 잊지 아니함"},
  {i:"결초보은", m:"죽은 뒤에라도 은혜를 잊지 않고 갚음"},
  {i:"근묵자흑", m:"나쁜 사람과 가까이하면 나쁜 버릇에 물들기 쉬움"},
  {i:"아전인수", m:"자기에게만 이롭게 되도록 생각하거나 행동함"},
  {i:"조삼모사", m:"당장의 차이만 알고 결과가 같음을 모름 · 잔꾀로 속임"},
  {i:"화룡점정", m:"가장 중요한 부분을 마무리하여 완성함"},
  {i:"견원지간", m:"개와 원숭이처럼 사이가 매우 나쁜 관계"},
  {i:"표리부동", m:"겉으로 드러나는 것과 속마음이 다름"},
  {i:"우유부단", m:"어물거리며 결단을 내리지 못함"},
  {i:"자포자기", m:"절망에 빠져 자신을 스스로 돌보지 아니함"},
  {i:"호가호위", m:"남의 권세를 빌려 위세를 부림"},
  {i:"등하불명", m:"등잔 밑이 어둡듯 가까이 있는 것을 오히려 잘 모름"},
  {i:"좌충우돌", m:"이리저리 마구 찌르고 부딪침"},
  {i:"진퇴양난", m:"나아갈 수도 물러설 수도 없는 어려운 처지"},
  {i:"형설지공", m:"온갖 고생을 하며 부지런히 공부한 보람"},
  {i:"마이동풍", m:"남의 말을 귀담아듣지 않고 흘려버림"},
  {i:"반신반의", m:"반은 믿고 반은 의심함"},
  {i:"백전백승", m:"싸울 때마다 다 이김"},
  {i:"십중팔구", m:"열 가운데 여덟이나 아홉 · 거의 대부분"},
  {i:"일편단심", m:"변치 않는 한결같은 마음"},
  {i:"작심삼일", m:"단단히 먹은 마음이 사흘을 가지 못함"},
  {i:"천고마비", m:"하늘이 높고 말이 살찌는 풍요로운 가을"},
  {i:"초지일관", m:"처음에 세운 뜻을 끝까지 밀고 나감"},
  {i:"팔방미인", m:"여러 방면에 능통한 사람"},
  {i:"학수고대", m:"학처럼 목을 빼고 몹시 간절히 기다림"},
  {i:"호연지기", m:"거침없이 넓고 큰 올바른 기운"},
  {i:"괄목상대", m:"눈을 비비고 다시 볼 만큼 실력이 부쩍 늚"},
  {i:"권선징악", m:"착한 일을 권하고 악한 일을 벌함"},
  {i:"타산지석", m:"남의 하찮은 언행도 자기 수양의 거울로 삼음"},
];

const TOTAL=10, TIME_MS=5000;
const NAME_KEY='memgame_name'; // 기억 게임과 닉네임 공유

/* ===== 서버 연동 ===== */
const Net = {
  available:false,
  online(){ return location.protocol==='http:'||location.protocol==='https:'; },
  async check(){
    if(!this.online()) return false;
    try{ const r=await fetch('/api/scores?game=idiom',{cache:'no-store'});
      if(r.ok){ await r.json(); this.available=true; } }catch(e){}
    return this.available;
  },
  async submit(name,score){
    if(!this.available) return null;
    try{ const r=await fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({game:'idiom',name,score,age:0,mode:'normal'})});
      if(r.ok) return await r.json(); }catch(e){}
    return null;
  },
  async board(){
    if(!this.available) return null;
    try{ const r=await fetch('/api/scores?game=idiom',{cache:'no-store'});
      if(r.ok) return await r.json(); }catch(e){}
    return null;
  }
};

/* ===== 유틸 ===== */
const $=id=>document.getElementById(id);
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function show(id){ ['startScreen','playScreen','resultScreen'].forEach(s=>$(s).classList.toggle('hide', s!==id)); }

/* ===== 게임 상태 ===== */
let name='', questions=[], qIdx=0, score=0, correct=0, timer=null, tStart=0, answered=false;

function buildQuestions(){
  const picked=shuffle(IDIOMS).slice(0,TOTAL);
  return picked.map(ans=>{
    const distractors=shuffle(IDIOMS.filter(x=>x.i!==ans.i)).slice(0,3);
    const options=shuffle([ans, ...distractors]);
    return { mean:ans.m, answer:ans.i, options:options.map(o=>o.i) };
  });
}

function startGame(){
  name=($('nick').value||'').trim().slice(0,12) || '익명';
  try{ localStorage.setItem(NAME_KEY, name); }catch(e){}
  questions=buildQuestions(); qIdx=0; score=0; correct=0;
  show('playScreen'); renderQuestion();
}

function renderQuestion(){
  answered=false;
  const q=questions[qIdx];
  $('qnum').textContent=qIdx+1;
  $('curScore').textContent=score;
  $('qmean').textContent=q.mean;
  const box=$('choices'); box.innerHTML='';
  q.options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='choice'; b.textContent=opt;
    b.onclick=()=>choose(b, opt, q);
    box.appendChild(b);
  });
  // 타이머
  const bar=$('timerbar');
  bar.style.transition='none'; bar.style.width='100%';
  void bar.offsetWidth;
  bar.style.transition=`width ${TIME_MS}ms linear`; bar.style.width='0%';
  tStart=Date.now();
  clearTimeout(timer);
  timer=setTimeout(()=>choose(null,null,q), TIME_MS);
}

function choose(btn, opt, q){
  if(answered) return;
  answered=true; clearTimeout(timer);
  const bar=$('timerbar');
  const elapsed=Date.now()-tStart;
  bar.style.transition='none';
  bar.style.width=getComputedStyle(bar).width; // 멈춤
  const isRight = opt===q.answer;
  const buttons=[...document.querySelectorAll('.choice')];
  buttons.forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  if(isRight){
    correct++;
    const remain=Math.max(0, TIME_MS-elapsed);
    const speedBonus=Math.round((remain/TIME_MS)*100); // 0~100
    score += 100 + speedBonus;
    $('curScore').textContent=score;
  }
  setTimeout(next, isRight?650:1050);
}

function next(){
  qIdx++;
  if(qIdx>=TOTAL) finish();
  else renderQuestion();
}

function grade(acc){
  if(acc>=100) return '완벽';
  if(acc>=90) return '학자';
  if(acc>=70) return '수재';
  if(acc>=50) return '평범';
  if(acc>=30) return '분발';
  return '재도전';
}

async function finish(){
  const acc=Math.round((correct/TOTAL)*100);
  $('finalScore').textContent=score.toLocaleString();
  $('correctCnt').textContent=correct;
  $('accuracy').textContent=acc+'%';
  $('gradeTxt').textContent=grade(acc);
  show('resultScreen');

  // 순위 저장/조회
  const note=$('netnote'); const box=$('boardBox');
  if(!Net.online()){
    box.classList.add('hide');
    note.textContent='혼자 모드예요. 순위를 겨루려면 부서 서버 주소(http://…:8000)로 접속하세요.';
    return;
  }
  await Net.check();
  if(!Net.available){
    box.classList.add('hide');
    note.textContent='순위 서버에 연결되지 않았어요. 기록이 저장되지 않았습니다.';
    return;
  }
  box.classList.remove('hide');
  let records = await Net.submit(name, score);
  if(!records) records = await Net.board();
  renderBoard(records||[]);
  note.textContent='기록이 부서 순위표에 저장됐어요.';
}

function renderBoard(records){
  const list=$('boardList');
  const sorted=records.slice().sort((a,b)=>(b.best||0)-(a.best||0)).slice(0,8);
  if(!sorted.length){ list.innerHTML='<div class="netnote">아직 기록이 없어요. 첫 주자가 되어보세요!</div>'; return; }
  list.innerHTML='';
  sorted.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='row'+(r.id===name?' me':'');
    div.innerHTML=`<span class="rank">${i+1}</span>`+
      `<span class="rname">${escapeHtml(r.id)}</span>`+
      `<span class="rscore">${(r.best||0).toLocaleString()}</span>`;
    list.appendChild(div);
  });
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===== 초기화 ===== */
(function init(){
  try{ const saved=localStorage.getItem(NAME_KEY); if(saved) $('nick').value=saved; }catch(e){}
  Net.check();
  $('startBtn').onclick=startGame;
  $('nick').addEventListener('keydown',e=>{ if(e.key==='Enter') startGame(); });
  $('retryBtn').onclick=startGame;
  $('homeBtn').onclick=()=>{ location.href='/'; };
})();
</script>
</body>
</html>
